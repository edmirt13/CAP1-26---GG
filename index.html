<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão e Governança no COMAER</title>
  <meta
    name="description"
    content="Aplicação web responsiva para estudo e avaliação em gestão, governança, administração pública, SPGIA, atos normativos, licitações e ETP no contexto da Força Aérea Brasileira."
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Serif:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
  <div class="page-backdrop" aria-hidden="true">
    <div class="orb orb-a"></div>
    <div class="orb orb-b"></div>
    <div class="grid-pattern"></div>
  </div>

  <div class="app-shell">
    <header class="topbar">
      <button class="brand-button" id="brand-home" type="button" aria-label="Voltar para a tela inicial">
        <span class="brand-kicker">EAOAR</span>
        <span class="brand-title">Gestão e Governança no COMAER</span>
      </button>

      <div class="topbar-actions">
        <button class="ghost-button" id="go-home" type="button">Início</button>
        <button class="ghost-button" id="go-disciplines" type="button">Disciplinas</button>
        <button class="ghost-button" id="go-question-map" type="button">Questões</button>
        <button class="secondary-button compact" id="go-exam-one" type="button">Prova 1</button>
        <button class="primary-button compact" id="go-exam-two" type="button">Prova 2</button>
      </div>
    </header>

    <main id="app" class="app-main" aria-live="polite">
      <section class="panel loading-panel">
        <div class="loader" aria-hidden="true"></div>
        <h1>Carregando base de estudo</h1>
        <p>Preparando disciplinas, estatísticas e banco inicial de questões.</p>
      </section>
    </main>
  </div>

  <noscript>
    <div class="noscript-box">
      Este sistema depende de JavaScript para carregar as questões, calcular a pontuação e preservar o progresso local.
    </div>
  </noscript>

  <script src="./assets/js/script.js" defer></script>
</body>
</html>
